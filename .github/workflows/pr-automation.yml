name: Pull Request Automation

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  code-quality:
    name: code-quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        id: eslint
        run: |
          npm run lint 2>&1 | tee eslint-output.txt
          echo "eslint_exit_code=$?" >> $GITHUB_ENV
        continue-on-error: true

      - name: Run Prettier formatting check
        id: prettier
        run: |
          npx prettier --check src/ 2>&1 | tee prettier-output.txt
          echo "prettier_exit_code=$?" >> $GITHUB_ENV
        continue-on-error: true

      - name: Post Code Quality Report as PR comment
        uses: actions/github-script@v7
        if: always()
        env:
          ESLINT_OUTPUT: ${{ steps.eslint.outputs.stdout }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const prNumber = context.issue.number;
            const eslintExitCode = process.env.eslint_exit_code || '0';
            const prettierExitCode = process.env.prettier_exit_code || '0';
            const fs = require('fs');
            let eslintOutput = '';
            try { eslintOutput = fs.readFileSync('eslint-output.txt', 'utf8'); } catch (e) {}
            let prettierOutput = '';
            try { prettierOutput = fs.readFileSync('prettier-output.txt', 'utf8'); } catch (e) {}
            
            const lintPassed = eslintExitCode === '0';
            const prettierPassed = prettierExitCode === '0';
            const overallPassed = lintPassed && prettierPassed;
            
            let comment = `## Code Quality Report\n\n`;
            comment += `**Overall Status:** ${overallPassed ? '✅ Passed' : '❌ Failed'}\n\n`;
            comment += `### ESLint ${lintPassed ? '✅ Passed' : '❌ Failed'}\n`;
            if (!lintPassed) {
              comment += `<details><summary>ESLint Issues</summary>\n\n\`\`\`\n${eslintOutput}\n\`\`\`\n</details>\n`;
            } else {
              comment += `No issues found.\n`;
            }
            comment += `\n### Prettier ${prettierPassed ? '✅ Passed' : '❌ Failed'}\n`;
            if (!prettierPassed) {
              comment += `<details><summary>Formatting Issues</summary>\n\n\`\`\`\n${prettierOutput}\n\`\`\`\n</details>\n`;
            } else {
              comment += `Formatting is consistent.\n`;
            }
            comment += `\n---\n*Generated by PR Automation Workflow*`;
            
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: prNumber,
              body: comment
            });

  testing-suite:
    name: testing-suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install jq for parsing coverage
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Run tests with coverage
        id: tests
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

      - name: Extract coverage summary
        id: coverage
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            echo "coverage_lines=$(jq -r '.total.lines.pct' coverage/coverage-summary.json)" >> $GITHUB_OUTPUT
            echo "coverage_statements=$(jq -r '.total.statements.pct' coverage/coverage-summary.json)" >> $GITHUB_OUTPUT
            echo "coverage_branches=$(jq -r '.total.branches.pct' coverage/coverage-summary.json)" >> $GITHUB_OUTPUT
            echo "coverage_functions=$(jq -r '.total.functions.pct' coverage/coverage-summary.json)" >> $GITHUB_OUTPUT
          else
            echo "coverage_lines=0" >> $GITHUB_OUTPUT
            echo "coverage_statements=0" >> $GITHUB_OUTPUT
            echo "coverage_branches=0" >> $GITHUB_OUTPUT
            echo "coverage_functions=0" >> $GITHUB_OUTPUT
          fi

      - name: Post Test Coverage Report as PR comment
        uses: actions/github-script@v7
        if: always()
        env:
          COVERAGE_LINES: ${{ steps.coverage.outputs.coverage_lines }}
          COVERAGE_STATEMENTS: ${{ steps.coverage.outputs.coverage_statements }}
          COVERAGE_BRANCHES: ${{ steps.coverage.outputs.coverage_branches }}
          COVERAGE_FUNCTIONS: ${{ steps.coverage.outputs.coverage_functions }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const prNumber = context.issue.number;
            const lines = process.env.COVERAGE_LINES || '0';
            const statements = process.env.COVERAGE_STATEMENTS || '0';
            const branches = process.env.COVERAGE_BRANCHES || '0';
            const functions = process.env.COVERAGE_FUNCTIONS || '0';
            
            const threshold = 70; // from package.json
            const linesOk = parseFloat(lines) >= threshold;
            const statementsOk = parseFloat(statements) >= threshold;
            const branchesOk = parseFloat(branches) >= threshold;
            const functionsOk = parseFloat(functions) >= threshold;
            const overallOk = linesOk && statementsOk && branchesOk && functionsOk;
            
            let comment = `## Test Coverage Report\n\n`;
            comment += `**Overall Status:** ${overallOk ? '✅ Passed' : '❌ Below threshold'}\n\n`;
            comment += `| Metric | Coverage | Threshold | Status |\n|--------|----------|-----------|--------|\n`;
            comment += `| Lines | ${lines}% | ${threshold}% | ${linesOk ? '✅' : '❌'} |\n`;
            comment += `| Statements | ${statements}% | ${threshold}% | ${statementsOk ? '✅' : '❌'} |\n`;
            comment += `| Branches | ${branches}% | ${threshold}% | ${branchesOk ? '✅' : '❌'} |\n`;
            comment += `| Functions | ${functions}% | ${threshold}% | ${functionsOk ? '✅' : '❌'} |\n`;
            comment += `\nCoverage artifacts have been uploaded.`;
            comment += `\n---\n*Generated by PR Automation Workflow*`;
            
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: prNumber,
              body: comment
            });

  security-scan:
    name: security-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # required for gitleaks

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        id: audit
        run: |
          npm audit --audit-level=moderate 2>&1 | tee audit-output.txt
          echo "audit_exit_code=$?" >> $GITHUB_ENV
        continue-on-error: true

      - name: Run secret scanning with gitleaks
        id: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Post Security Scan Report as PR comment
        uses: actions/github-script@v7
        if: always()
        env:
          AUDIT_EXIT_CODE: ${{ env.audit_exit_code }}
          GITLEAKS_EXIT_CODE: ${{ steps.gitleaks.outcome }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const prNumber = context.issue.number;
            const auditExitCode = process.env.AUDIT_EXIT_CODE || '0';
            const gitleaksExitCode = process.env.GITLEAKS_EXIT_CODE;
            const fs = require('fs');
            let auditOutput = '';
            try { auditOutput = fs.readFileSync('audit-output.txt', 'utf8'); } catch (e) {}
            
            const auditPassed = auditExitCode === '0';
            const gitleaksPassed = gitleaksExitCode === 'success' || gitleaksExitCode === 'skipped';
            
            let comment = `## Security Scan Report\n\n`;
            comment += `### Dependencies Vulnerabilities ${auditPassed ? '✅ Passed' : '❌ Found'}\n`;
            if (!auditPassed) {
              comment += `<details><summary>npm audit details</summary>\n\n\`\`\`\n${auditOutput}\n\`\`\`\n</details>\n`;
            } else {
              comment += `No moderate or higher severity vulnerabilities found.\n`;
            }
            comment += `\n### Secret Scanning ${gitleaksPassed ? '✅ Passed' : '❌ Potential secrets detected'}\n`;
            if (!gitleaksPassed) {
              comment += `Potential secrets detected in the code changes. Please review the Gitleaks output.\n`;
            } else {
              comment += `No secrets detected.\n`;
            }
            comment += `\n---\n*Generated by PR Automation Workflow*`;
            
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: prNumber,
              body: comment
            });

  build-validation:
    name: build-validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build validation
        id: build
        run: npm run build

      - name: Start server in background with health check
        id: server
        run: |
          npm start &
          SERVER_PID=$!
          echo "SERVER_PID=$SERVER_PID" >> $GITHUB_ENV
          # Wait for server to be ready
          for i in {1..10}; do
            if curl -s -f http://localhost:3000/health > /dev/null; then
              echo "Server is up after $i attempts"
              break
            fi
            sleep 2
          done

      - name: Validate endpoints
        id: validate
        run: |
          curl -f http://localhost:3000/health && echo "Health endpoint: OK"
          curl -f http://localhost:3000/ && echo "Root endpoint: OK"
          curl -f http://localhost:3000/status/deployment && echo "Deployment status endpoint: OK"
          echo "validation_exit_code=$?" >> $GITHUB_ENV
        continue-on-error: true

      - name: Stop server
        if: always()
        run: |
          if [ -n "$SERVER_PID" ]; then
            kill $SERVER_PID 2>/dev/null || true
          fi
          pkill -f "node src/app.js" 2>/dev/null || true

      - name: Create deployment preview artifact
        if: always()
        run: |
          zip -r deployment-preview.zip . -x "node_modules/*" -x ".git/*" -x "coverage/*" -x "*.zip"

      - name: Upload deployment preview artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deployment-preview
          path: deployment-preview.zip

      - name: Post Build Validation Report as PR comment
        uses: actions/github-script@v7
        if: always()
        env:
          VALIDATION_EXIT_CODE: ${{ env.validation_exit_code }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const prNumber = context.issue.number;
            const validationExitCode = process.env.VALIDATION_EXIT_CODE || '0';
            const buildPassed = validationExitCode === '0';
            
            let comment = `## Build Validation\n\n`;
            comment += `**Overall Status:** ${buildPassed ? '✅ Passed' : '❌ Failed'}\n\n`;
            comment += `- ✅ Build completed successfully.\n`;
            if (buildPassed) {
              comment += `- ✅ Health endpoint accessible.\n`;
              comment += `- ✅ Root endpoint accessible.\n`;
              comment += `- ✅ Deployment status endpoint accessible.\n`;
            } else {
              comment += `- ❌ One or more endpoints failed to respond.\n`;
            }
            comment += `\nDeployment preview artifact has been uploaded.\n`;
            comment += `\n---\n*Generated by PR Automation Workflow*`;
            
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: prNumber,
              body: comment
            });